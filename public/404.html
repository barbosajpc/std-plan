<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redireciona para index.html preservando o path como query param
      const repo = '/std-plan';
      const path = window.location.pathname.replace(repo, '') || '/';
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        repo + '/?p=' + encodeURIComponent(path + search) + hash
      );
    </script>
  </head>
  <body></body>
</html>
